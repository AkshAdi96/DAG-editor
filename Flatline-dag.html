<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flatline DAG Architect (Variable Engine)</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
    
    <style>
        :root {
            --bg-color: #1e1e1e; --node-bg: #252526; --text-color: #e0e0e0;
            --accent: #007acc; --danger: #d32f2f; --magic: #8e44ad;
            --subj-physics: #005A9E; --subj-chemistry: #2E7D32; --subj-math: #B71C1C; --subj-bio: #00695C;
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); overflow: hidden; color: var(--text-color); }
        #drawflow { width: 100%; height: 100%; background-size: 25px 25px; background-image: linear-gradient(to right, #333 1px, transparent 1px), linear-gradient(to bottom, #333 1px, transparent 1px); }

        .drawflow .drawflow-node { background: var(--node-bg) !important; border: 1px solid #444 !important; box-shadow: 0 4px 15px rgba(0,0,0,0.6) !important; border-radius: 8px !important; width: 340px; padding: 0 !important; z-index: 2; transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s; }
        .drawflow .drawflow-node.selected { border: 1px solid var(--accent) !important; box-shadow: 0 0 15px rgba(0, 122, 204, 0.4) !important; }
        
        .subj-Physics .title-box { background: var(--subj-physics) !important; }
        .subj-Chemistry .title-box { background: var(--subj-chemistry) !important; }
        .subj-Mathematics .title-box { background: var(--subj-math) !important; }
        .subj-Biology .title-box { background: var(--subj-bio) !important; }

        .drawflow .drawflow-delete { background: #333 !important; color: #aaa !important; border: 1px solid #555 !important; border-radius: 50% !important; width: 24px !important; height: 24px !important; line-height: 22px !important; font-size: 12px !important; top: -12px !important; right: -12px !important; transition: 0.2s; z-index: 9999 !important; cursor: pointer !important; display: flex !important; align-items: center; justify-content: center; }
        .drawflow .drawflow-delete:hover { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        
        .drawflow .drawflow-node .title-box { padding: 6px 12px; border-radius: 7px 7px 0 0; font-weight: bold; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .action-btns { display: flex; gap: 5px; }
        .mini-btn { background: rgba(0,0,0,0.2); border: none; color: white; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: monospace; }
        .mini-btn:hover { background: rgba(0,0,0,0.4); }

        .drawflow .drawflow-node .box { padding: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .drawflow .drawflow-node .box.collapsed { display: none; }
        .drawflow .drawflow-node input, .drawflow .drawflow-node select { width: 100%; background: #111; border: 1px solid #555; color: #fff; padding: 4px; border-radius: 4px; box-sizing: border-box; font-size: 11px; }

        .span-3 { grid-column: span 3; } .span-2 { grid-column: span 2; }
        label { font-size: 10px; color: #aaa; margin-bottom: 2px; display: block; }
        .section-label { grid-column: span 3; font-size: 11px; font-weight: bold; color: #ccc; margin-top: 5px; border-bottom: 1px solid #444; padding-bottom: 2px;}

        .drawflow .connection .main-path { stroke: #888; stroke-width: 3px; }
        .drawflow .connection .main-path.selected { stroke: var(--accent); stroke-width: 4px; }

        .panel { position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; gap: 10px; flex-wrap: wrap; width: 95%; align-items: center;}
        .primary-btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .primary-btn:hover { filter: brightness(1.2); }
        .btn-export { background: #2e7d32; } .btn-workspace { background: #555; } .btn-import { background: #d84315; }
        .btn-view { background: #444; } .btn-view:hover { background: #555; }
        .btn-magic { background: var(--magic); } .btn-magic:hover { filter: brightness(1.2); }
        .search-box { padding: 8px; border-radius: 5px; border: 1px solid #555; background: #111; color: white; width: 250px; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #252526; z-index: 100; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #444; padding: 20px; flex-direction: column; }
        #json-modal { width: 70%; height: 80%; } #edge-modal { width: 350px; gap: 10px;}
        textarea { flex-grow: 1; background: #1e1e1e; color: #d4d4d4; border: 1px solid #444; font-family: monospace; padding: 15px; border-radius: 5px; resize: none; }
        .close-btn { margin-top: 15px; align-self: flex-end; background: #555; border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .close-btn:hover { background: #666; }
        .delete-btn { background: #8b0000; } .delete-btn:hover { background: #a50000; }
        #edge-modal select, #edge-modal input { width: 100%; background: #111; color: #fff; padding: 8px; border: 1px solid #555; border-radius: 4px; margin-bottom: 10px;}
        .edge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 5px; }
    </style>
</head>
<body>

    <div class="panel">
        <button class="primary-btn" onclick="addChapterNode()">+ Add Node</button>
        <button class="primary-btn btn-workspace" onclick="downloadWorkspace()">💾 Local Backup</button>
        <button class="primary-btn btn-workspace" onclick="document.getElementById('file-ws').click()">📂 Load Workspace</button>
        
        <button class="primary-btn btn-view" onclick="collapseAllNodes()">⏬ Collapse All</button>
        <button class="primary-btn btn-view" onclick="expandAllNodes()">⏫ Expand All</button>
        <button class="primary-btn btn-view" onclick="snapAllWires()">🔄 Refresh Wires</button>
        <button class="primary-btn btn-magic" onclick="autoGenerateWeights()">✨ Auto-Weights</button>
        <button class="primary-btn btn-import" onclick="document.getElementById('file-engine').click()">📥 Import JSON</button>

        <input type="text" class="search-box" placeholder="🔍 Search Nodes..." onkeyup="searchNodes(this.value)">
        
        <div style="flex-grow: 1;"></div>
        <button class="primary-btn btn-export" onclick="exportToFlatlineJSON()">🚀 Compile Flatline JSON</button>

        <input type="file" id="file-ws" style="display: none;" accept=".json" onchange="loadWorkspaceFromFile(event)">
        <input type="file" id="file-engine" style="display: none;" accept=".json" onchange="importEngineJSON(event)">
    </div>

    <div id="drawflow"></div>

    <div id="json-modal" class="modal">
        <h2 style="margin-top: 0;">Flatline Engine JSON</h2>
        <textarea id="json-output"></textarea>
        <button class="close-btn" onclick="closeModal('json-modal')">Close</button>
    </div>

    <div id="edge-modal" class="modal">
        <h3 style="margin-top: 0; color: var(--accent);">Edit Dependency Edge</h3>
        <p style="font-size: 12px; color: #aaa; margin-top: -10px;" id="edge-desc">From A to B</p>
        
        <label>Dependency Weight</label>
        <select id="edge-weight">
            <option value="1.00">1.00 (Hard Block)</option>
            <option value="0.35">0.35 (Significant Friction)</option>
            <option value="0.19">0.19 (Soft Link)</option>
        </select>
        
        <div class="section-label" style="margin-top: 5px; color: var(--accent);">Required Mastery Gates</div>
        <div class="edge-grid" id="dynamic-edge-gates"></div>

        <label style="margin-top: 10px;">Notes (Optional)</label><input type="text" id="edge-notes" placeholder="Why is this required?">
        
        <button class="primary-btn" onclick="saveEdgeData()" style="width: 100%; margin-top: 10px;">Save Edge</button>
        <button class="close-btn delete-btn" style="width: 100%; margin-top: 5px;" onclick="deleteSelectedEdge()">Delete Edge</button>
        <button class="close-btn" style="width: 100%; margin-top: 5px;" onclick="closeModal('edge-modal')">Cancel</button>
    </div>

    <script>
        // ============================================================================
        // GLOBAL EXAM CONFIGURATION (THE VARIABLES)
        // Edit this array to completely change the tool's functionality.
        // To make a single-exam DAG maker, simply leave only 1 exam in this array!
        // ============================================================================
        const TARGET_EXAMS = [
            { key: 'exam1', id: 'jee_main', label: 'JEE Main' },
            { key: 'exam2', id: 'jee_adv', label: 'JEE Adv' },
            { key: 'exam3', id: 'neet', label: 'NEET' }
        ];

        // ----------------------------------------------------------------------------
        // Engine Setup
        // ----------------------------------------------------------------------------
        const id = document.getElementById("drawflow");
        const editor = new Drawflow(id);
        editor.reroute = true;
        editor.start();

        let edgeMetadata = {};
        let currentSelectedEdge = null;

        document.getElementById('drawflow').addEventListener('wheel', function(e) {
            if (e.altKey) {
                e.preventDefault();
                if (e.deltaY > 0) editor.zoom_out();
                else editor.zoom_in();
            }
        });

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        // --- DYNAMIC UI GENERATORS ---

        function initDynamicEdgeModal() {
            const container = document.getElementById('dynamic-edge-gates');
            container.innerHTML = '';
            TARGET_EXAMS.forEach(ex => {
                container.innerHTML += `
                <div>
                    <label>${ex.label}</label>
                    <select id="edge-mastery-${ex.key}">
                        <option value="U0">U0</option><option value="U1">U1</option>
                        <option value="U2" selected>U2</option>
                        <option value="U3">U3</option><option value="U4">U4</option>
                    </select>
                </div>`;
            });
        }

        function getChapterHTML() {
            let yieldHtml = '';
            let weightHtml = '';
            let nodeData = { chapter_id: "", name: "", subject: "Physics", isRoot: "false", baseHours: 10, effort: 5 };
            
            TARGET_EXAMS.forEach(ex => {
                // Generate UI Inputs
                yieldHtml += `<div><label>${ex.label}</label><input type="number" step="0.1" df-yield_${ex.key} value="4.0"></div>`;
                weightHtml += `<div><label>${ex.label}</label><input type="number" step="0.1" df-w_${ex.key} value="1.0"></div>`;
                // Generate default data bindings
                nodeData[`yield_${ex.key}`] = 4.0;
                nodeData[`w_${ex.key}`] = 1.0;
            });

            const html = `
            <div class="subj-Physics">
                <div class="title-box">
                    <span class="node-title-display" style="max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Unnamed Chapter</span>
                    <div class="action-btns"><button class="mini-btn" onclick="cloneNode(this, event)">Clone</button><button class="mini-btn" onclick="toggleCollapse(this, event)">▼ Exp</button></div>
                </div>
                <div class="box collapsed">
                    <div class="span-3"><label>ID (Unique)</label><input type="text" df-chapter_id placeholder="phy_chapter_id"></div>
                    <div class="span-2"><label>Name</label><input type="text" df-name placeholder="Chapter Name" oninput="updateTitle(this)"></div>
                    
                    <div><label>Subject</label><select df-subject onchange="updateSubjectColor(this)"><option value="Physics">Physics</option><option value="Chemistry">Chemistry</option><option value="Mathematics">Mathematics</option><option value="Biology">Biology</option></select></div>
                    
                    <div class="section-label">Core Parameters</div>
                    <div><label>Root Node?</label><select df-isRoot><option value="false">No</option><option value="true">Yes</option></select></div>
                    <div><label>Base Hrs</label><input type="number" df-baseHours value="10"></div>
                    <div><label>Effort (3-10)</label><input type="number" df-effort value="5"></div>
                    
                    <div class="section-label">Yield (Marks)</div>
                    ${yieldHtml}
                    
                    <div class="section-label">Exam Weight (0.0 - 1.0)</div>
                    ${weightHtml}
                </div>
            </div>`;

            return { html, nodeData };
        }

        // Initialize modals on load
        window.addEventListener('DOMContentLoaded', () => {
            initDynamicEdgeModal();
            const saved = localStorage.getItem('flatline_workspace');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    editor.import(parsed.drawflow);
                    edgeMetadata = parsed.edges || {};
                    applySubjectColorsToAll(); updateAllNodeTitles(); collapseAllNodes(); saveToLocal(); 
                } catch(e) {}
            }
        });

        // --- LOCAL PERSISTENCE ---
        function saveToLocal() {
            const data = editor.export();
            localStorage.setItem('flatline_workspace', JSON.stringify({ drawflow: data, edges: edgeMetadata }));
        }

        editor.on('nodeCreated', saveToLocal); editor.on('nodeRemoved', saveToLocal);
        editor.on('connectionCreated', saveToLocal); editor.on('connectionRemoved', saveToLocal);
        editor.on('nodeMoved', saveToLocal); document.getElementById('drawflow').addEventListener('input', saveToLocal);

        function downloadWorkspace() {
            saveToLocal();
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(localStorage.getItem('flatline_workspace'));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "flatline_workspace.json");
            document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
        }

        function loadWorkspaceFromFile(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (Array.isArray(parsed) || parsed.chapters) {
                        alert("⚠️ WRONG FILE TYPE ⚠️\nYou uploaded Engine JSON. Please use the orange 'Import JSON' button for this file."); return;
                    }
                    if (!parsed.drawflow) { alert("ERROR: Invalid workspace file."); return; }
                    editor.import(parsed.drawflow); edgeMetadata = parsed.edges || {};
                    applySubjectColorsToAll(); updateAllNodeTitles(); collapseAllNodes(); saveToLocal();
                } catch(err) { alert("Invalid JSON file."); }
            };
            reader.readAsText(file); event.target.value = '';
        }

        // --- DAG LOGIC & VISUALS ---
        function snapAllWires() {
            const snapCore = () => {
                const data = editor.export().drawflow.Home.data;
                for (const nodeId in data) { try { editor.updateConnectionNodes(nodeId); } catch(e) {} }
            };
            snapCore(); requestAnimationFrame(snapCore); setTimeout(snapCore, 20); setTimeout(snapCore, 50); setTimeout(snapCore, 150);
        }

        function collapseAllNodes() {
            document.querySelectorAll('.drawflow-node').forEach(node => {
                const box = node.querySelector('.box');
                const btn = Array.from(node.querySelectorAll('.mini-btn')).find(b => b.innerText.includes('Col') || b.innerText.includes('Exp'));
                if (box) box.classList.add('collapsed');
                if (btn) btn.innerText = '▼ Exp';
            });
            snapAllWires(); saveToLocal();
        }

        function expandAllNodes() {
            document.querySelectorAll('.drawflow-node').forEach(node => {
                const box = node.querySelector('.box');
                const btn = Array.from(node.querySelectorAll('.mini-btn')).find(b => b.innerText.includes('Col') || b.innerText.includes('Exp'));
                if (box) box.classList.remove('collapsed');
                if (btn) btn.innerText = '▲ Col';
            });
            snapAllWires(); saveToLocal();
        }

        function autoGenerateWeights() {
            if (!confirm("This will auto-calculate Exam Weights (0.2 + 0.8 * sqrt(yield/maxYield)) for all configured exams.\n\nAre you sure?")) return;
            
            const nodes = document.querySelectorAll('.drawflow-node');
            const maxYields = { 'Physics': {}, 'Chemistry': {}, 'Mathematics': {}, 'Biology': {} };
            
            // Initialize max maps
            Object.keys(maxYields).forEach(subj => TARGET_EXAMS.forEach(ex => maxYields[subj][ex.key] = 0.1));

            // Find Maximums
            nodes.forEach(node => {
                const subj = node.querySelector('[df-subject]').value || 'Physics';
                TARGET_EXAMS.forEach(ex => {
                    const y = parseFloat(node.querySelector(`[df-yield_${ex.key}]`).value) || 0;
                    if (y > maxYields[subj][ex.key]) maxYields[subj][ex.key] = y;
                });
            });

            // Apply Weights
            nodes.forEach(node => {
                const subj = node.querySelector('[df-subject]').value || 'Physics';
                TARGET_EXAMS.forEach(ex => {
                    const y = parseFloat(node.querySelector(`[df-yield_${ex.key}]`).value) || 0;
                    const max = maxYields[subj][ex.key] || 0.1;
                    const weight = y > 0 ? Math.min(0.2 + 0.8 * Math.sqrt(y / max), 1.0).toFixed(2) : 0;
                    
                    const weightInput = node.querySelector(`[df-w_${ex.key}]`);
                    weightInput.value = weight;
                    weightInput.dispatchEvent(new Event('input'));
                });
            });
            saveToLocal();
            alert("✨ Exam Weights have been automatically normalized for all configured exams!");
        }

        function updateTitle(input) {
            const display = input.closest('.drawflow-node').querySelector('.node-title-display');
            display.innerText = input.value || "Unnamed Chapter"; saveToLocal();
        }

        function updateAllNodeTitles() {
            document.querySelectorAll('.drawflow-node').forEach(node => {
                const nameInput = node.querySelector('[df-name]'); if (nameInput) updateTitle(nameInput);
            });
        }

        function updateSubjectColor(select) {
            const node = select.closest('.drawflow-node');
            node.classList.remove('subj-Physics', 'subj-Chemistry', 'subj-Mathematics', 'subj-Biology');
            node.classList.add('subj-' + select.value); saveToLocal();
        }

        function applySubjectColorsToAll() {
            document.querySelectorAll('.drawflow-node').forEach(node => {
                const select = node.querySelector('[df-subject]'); if(select) updateSubjectColor(select);
            });
        }

        function toggleCollapse(btn, event) {
            event.stopPropagation(); const node = btn.closest('.drawflow-node');
            node.querySelector('.box').classList.toggle('collapsed');
            btn.innerText = node.querySelector('.box').classList.contains('collapsed') ? '▼ Exp' : '▲ Col';
            requestAnimationFrame(() => { setTimeout(() => { editor.updateConnectionNodes(node.id.replace('node-','')); }, 40); });
        }

        function cloneNode(btn, event) {
            event.stopPropagation();
            const sourceNode = btn.closest('.drawflow-node');
            const nodeId = sourceNode.id.replace('node-', '');
            const rawData = editor.export().drawflow.Home.data[nodeId];
            if (!rawData) return;
            const newData = JSON.parse(JSON.stringify(rawData.data)); 
            const uniqueSuffix = "_copy_" + Math.floor(Math.random() * 10000);
            newData.chapter_id = (newData.chapter_id || "unnamed") + uniqueSuffix; 
            newData.name = (newData.name || "Unnamed") + " (Copy)";
            
            const isCollapsed = sourceNode.querySelector('.box').classList.contains('collapsed');
            const posX = (rawData.pos_x ?? window.innerWidth/2) + 30; const posY = (rawData.pos_y ?? window.innerHeight/2) + 30;
            const newNodeId = editor.addNode('chapter', 1, 1, posX, posY, 'chapter', newData, getChapterHTML().html);
            
            setTimeout(() => { 
                applySubjectColorsToAll(); updateAllNodeTitles(); 
                if (!isCollapsed) {
                    const newNode = document.getElementById('node-' + newNodeId);
                    if (newNode) {
                        newNode.querySelector('.box').classList.remove('collapsed');
                        const colBtn = Array.from(newNode.querySelectorAll('.mini-btn')).find(b => b.innerText.includes('Col') || b.innerText.includes('Exp'));
                        if (colBtn) colBtn.innerText = '▲ Col';
                        editor.updateConnectionNodes(newNodeId);
                    }
                }
                snapAllWires(); saveToLocal();
            }, 50); 
        }

        function searchNodes(query) {
            query = query.toLowerCase();
            document.querySelectorAll('.drawflow-node').forEach(n => {
                const name = n.querySelector('[df-name]').value.toLowerCase();
                const id = n.querySelector('[df-chapter_id]').value.toLowerCase();
                if (query === '') { n.style.opacity = '1'; n.style.boxShadow = ''; } 
                else if (name.includes(query) || id.includes(query)) { n.style.opacity = '1'; n.style.boxShadow = '0 0 20px yellow, inset 0 0 10px yellow'; } 
                else { n.style.opacity = '0.2'; n.style.boxShadow = 'none'; }
            });
        }

        // --- EDGE EVENTS ---
        editor.on('connectionCreated', function(info) {
            const edgeKey = `${info.output_id}-${info.input_id}`;
            if (!edgeMetadata[edgeKey]) {
                const rm = {}; TARGET_EXAMS.forEach(ex => rm[ex.id] = "U2");
                edgeMetadata[edgeKey] = { weight: 1.00, requiredMastery: rm, notes: "" };
            }
        });

        editor.on('connectionSelected', function(info) {
            currentSelectedEdge = `${info.output_id}-${info.input_id}`;
            const data = edgeMetadata[currentSelectedEdge];
            
            document.getElementById('edge-weight').value = data.weight;
            
            TARGET_EXAMS.forEach(ex => {
                const selectElement = document.getElementById(`edge-mastery-${ex.key}`);
                if (selectElement) {
                    selectElement.value = data.requiredMastery[ex.id] || "U2";
                }
            });
            
            document.getElementById('edge-notes').value = data.notes || "";
            
            const nodes = editor.export().drawflow.Home.data;
            document.getElementById('edge-desc').innerText = `${nodes[info.output_id].data.name || 'A'} ➔ ${nodes[info.input_id].data.name || 'B'}`;
            document.getElementById('edge-modal').style.display = 'flex';
        });

        function saveEdgeData() {
            if (currentSelectedEdge) {
                const rm = {};
                TARGET_EXAMS.forEach(ex => {
                    const el = document.getElementById(`edge-mastery-${ex.key}`);
                    if (el) rm[ex.id] = el.value;
                });

                edgeMetadata[currentSelectedEdge] = { 
                    weight: parseFloat(document.getElementById('edge-weight').value), 
                    requiredMastery: rm, 
                    notes: document.getElementById('edge-notes').value 
                };
                saveToLocal();
            }
            closeModal('edge-modal');
        }

        function deleteSelectedEdge() {
            if (currentSelectedEdge) {
                const parts = currentSelectedEdge.split('-');
                if (parts.length === 2) {
                    editor.removeSingleConnection(parts[0], parts[1], 'output_1', 'input_1');
                    delete edgeMetadata[currentSelectedEdge]; saveToLocal();
                }
            }
            closeModal('edge-modal');
        }

        function addChapterNode() {
            const template = getChapterHTML();
            editor.addNode('chapter', 1, 1, window.innerWidth/2 - 160, window.innerHeight/2 - 200, 'chapter', template.nodeData, template.html);
        }

        // --- IMPORT ENGINE JSON ---
        function importEngineJSON(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let parsed = JSON.parse(e.target.result);
                    if (parsed.chapters) parsed = parsed.chapters; 
                    if (!Array.isArray(parsed)) { alert("ERROR: File must be an array of Flatline chapters."); return; }

                    editor.clearModuleSelected();
                    edgeMetadata = {};
                    const idMap = {}; 

                    parsed.forEach((c, index) => {
                        const template = getChapterHTML();
                        let nodeData = template.nodeData;
                        
                        nodeData.chapter_id = c.id || "";
                        nodeData.name = c.name || "";
                        nodeData.subject = c.subject || "Physics";
                        nodeData.isRoot = c.rootNode ? "true" : "false";
                        nodeData.baseHours = c.baseHours || 10;
                        nodeData.effort = c.effort || 5;

                        // Dynamically map values from the JSON back to the UI variables
                        TARGET_EXAMS.forEach(ex => {
                            nodeData[`yield_${ex.key}`] = c.yield?.[ex.id] || 0;
                            nodeData[`w_${ex.key}`] = c.examWeight?.[ex.id] || 1.0;
                        });

                        const px = 100 + (index % 4) * 350; 
                        const py = 100 + Math.floor(index / 4) * 300;
                        const nodeId = editor.addNode('chapter', 1, 1, px, py, 'chapter', nodeData, template.html);
                        idMap[c.id] = nodeId;
                    });

                    parsed.forEach(c => {
                        const toNodeId = idMap[c.id];
                        if (!toNodeId || !c.dependencies) return;
                        c.dependencies.forEach(dep => {
                            const fromNodeId = idMap[dep.fromId];
                            if (fromNodeId) {
                                editor.addConnection(fromNodeId, toNodeId, 'output_1', 'input_1');
                                const edgeKey = `${fromNodeId}-${toNodeId}`;
                                
                                const rm = {};
                                TARGET_EXAMS.forEach(ex => {
                                    if (typeof dep.requiredMastery === 'string') rm[ex.id] = dep.requiredMastery;
                                    else rm[ex.id] = dep.requiredMastery?.[ex.id] || "U2";
                                });

                                edgeMetadata[edgeKey] = { weight: dep.weight || 1.00, requiredMastery: rm, notes: dep.notes || "" };
                            }
                        });
                    });

                    applySubjectColorsToAll(); updateAllNodeTitles();
                    collapseAllNodes(); saveToLocal();
                    alert("✅ Import Successful!\n\nI have automatically drawn the nodes and connected the wires.");
                } catch(err) { alert("Failed to parse file."); console.error(err); }
            };
            reader.readAsText(file); event.target.value = '';
        }

        // --- EXPORT COMPILER ---
        function exportToFlatlineJSON() {
            const rawData = editor.export().drawflow.Home.data;
            const flatlineArray = []; const idSet = new Set(); const adjList = {}; let orphans = [];

            const maxYields = { 'Physics': {}, 'Chemistry': {}, 'Mathematics': {}, 'Biology': {} };
            Object.keys(maxYields).forEach(subj => TARGET_EXAMS.forEach(ex => maxYields[subj][ex.key] = 0.1));

            for (const key in rawData) {
                const node = rawData[key]; const d = node.data;
                const chapterId = (d.chapter_id || '').trim();
                
                if (!chapterId) { alert(`Error: Node missing chapter_id.`); return; }
                if (idSet.has(chapterId)) { alert(`Error: Duplicate ID "${chapterId}".`); return; }
                idSet.add(chapterId);
                if (node.inputs.input_1.connections.length === 0 && node.outputs.output_1.connections.length === 0) orphans.push(d.name || chapterId);
                adjList[key] = [];
                for (const conn of node.outputs.output_1.connections) adjList[key].push(conn.node);

                const subj = d.subject || 'Physics';
                TARGET_EXAMS.forEach(ex => {
                    const y = parseFloat(d[`yield_${ex.key}`]) || 0;
                    if (y > maxYields[subj][ex.key]) maxYields[subj][ex.key] = y;
                });
            }

            if (orphans.length > 0 && !confirm(`Warning: ${orphans.length} orphan nodes found. Proceed?`)) return;

            function hasCycle() {
                const visited = new Set(); const recStack = new Set();
                function dfs(nodeKey) {
                    if (!visited.has(nodeKey)) {
                        visited.add(nodeKey); recStack.add(nodeKey);
                        for (let neighbor of (adjList[nodeKey] || [])) {
                            if (!visited.has(neighbor) && dfs(neighbor)) return true;
                            else if (recStack.has(neighbor)) return true;
                        }
                    }
                    recStack.delete(nodeKey); return false;
                }
                for (let key in adjList) if (dfs(key)) return true; return false;
            }
            if (hasCycle()) { alert("CRITICAL ERROR: Cycle detected (DAG loop)."); return; }

            for (const key in rawData) {
                const node = rawData[key]; const d = node.data;
                const dependencies = [];
                for (const conn of node.inputs.input_1.connections) {
                    const parentNode = rawData[conn.node];
                    if (parentNode) {
                        const meta = edgeMetadata[`${conn.node}-${key}`];
                        const rmOutput = {};
                        
                        TARGET_EXAMS.forEach(ex => {
                            if (meta && meta.requiredMastery && meta.requiredMastery[ex.id]) {
                                rmOutput[ex.id] = meta.requiredMastery[ex.id];
                            } else {
                                rmOutput[ex.id] = "U2"; // Fallback safety
                            }
                        });

                        let depObj = { 
                            fromId: (parentNode.data.chapter_id || '').trim(), 
                            weight: meta ? meta.weight : 1.00, 
                            requiredMastery: rmOutput
                        };
                        if (meta && meta.notes && meta.notes.trim() !== "") depObj.notes = meta.notes.trim();
                        dependencies.push(depObj);
                    }
                }

                const subj = d.subject || 'Physics';
                let yields = {};
                let weights = {};
                let isCustomOverride = false;

                TARGET_EXAMS.forEach(ex => {
                    const y = parseFloat(d[`yield_${ex.key}`]) || 0;
                    const w = parseFloat(d[`w_${ex.key}`]) || 0;
                    const max = maxYields[subj][ex.key] || 0.1;
                    
                    yields[ex.id] = y;
                    weights[ex.id] = w;
                    
                    const expected_w = y > 0 ? (0.2 + 0.8 * Math.sqrt(y / max)) : 0;
                    if (Math.abs(w - expected_w) > 0.02) isCustomOverride = true;
                });

                let nodeObj = {
                    id: (d.chapter_id || '').trim(), subject: subj, name: d.name || "Unnamed",
                    yield: yields,
                    baseHours: parseFloat(d.baseHours) || 10, effort: Math.max(3, Math.min(10, parseInt(d.effort) || 5)),
                    rootNode: d.isRoot === "true", dependencies: dependencies
                };

                if (isCustomOverride) nodeObj.examWeight = weights;
                flatlineArray.push(nodeObj);
            }

            const finalExport = { chapters: flatlineArray };
            document.getElementById("json-output").value = JSON.stringify(finalExport, null, 2);
            document.getElementById("json-modal").style.display = "flex";
        }
    </script>
